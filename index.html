                        <div class="flex items-center gap-2">

                            <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=400&h=250&fit=crop"

                            <img src="https://images.unsplash.com/photo-1609630875171-b1321377ee65?w=400&h=250&fit=crop"
                                class="w-[260px] sm:w-[300px] md:w-[340px] h-[140px] sm:h-[170px] md:h-[190px] rounded-2xl object-cover mr-3"
                                alt="Ride 3">
                            <img src="https://images.unsplash.com/photo-1622185135505-2d795003994a?w=400&h=250&fit=crop"
                                class="w-[260px] sm:w-[300px] md:w-[340px] h-[140px] sm:h-[170px] md:h-[190px] rounded-2xl object-cover mr-3"
                                alt="Ride 4">
                            <img src="https://images.unsplash.com/photo-1571008887538-b36bb32f4571?w=400&h=250&fit=crop"
                                class="w-[260px] sm:w-[300px] md:w-[340px] h-[140px] sm:h-[170px] md:h-[190px] rounded-2xl object-cover mr-3"
                                alt="Ride 5">
                            <img src="https://images.unsplash.com/photo-1525160354320-d8e92641c563?w=400&h=250&fit=crop"

                    </div>
                    <div class="flex items-center gap-1.5 mt-3 justify-center" id="heroDots"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== MARQUEE ===== -->
    <div class="py-4 border-y border-white/5 overflow-hidden">
        <div class="flex whitespace-nowrap marquee-track">
            <!-- Marquee content remains same -->
            <span class="text-[11px] uppercase tracking-[0.2em] text-neutral-600 mx-8">Windshields</span>
            <span class="text-orange-500/40 mx-2">✦</span>
            <span class="text-[11px] uppercase tracking-[0.2em] text-neutral-600 mx-8">Touring Screens</span>
            <span class="text-orange-500/40 mx-2">✦</span>
            <span class="text-[11px] uppercase tracking-[0.2em] text-neutral-600 mx-8">Phone Mounts</span>
            <span class="text-orange-500/40 mx-2">✦</span>
            <span class="text-[11px] uppercase tracking-[0.2em] text-neutral-600 mx-8">LED Lights</span>
            <span class="text-orange-500/40 mx-2">✦</span>
            <span class="text-[11px] uppercase tracking-[0.2em] text-neutral-600 mx-8">Luggage Systems</span>
            <span class="text-orange-500/40 mx-2">✦</span>
            <span class="text-[11px] uppercase tracking-[0.2em] text-neutral-600 mx-8">Hand Guards</span>
        </div>
    </div>



    <script>
        async function loadHeader() {
            try {
                const response = await fetch('./Header/Header.html');
                if (!response.ok) throw new Error('Header.html not found: ' + response.status);
                const data = await response.text();
                document.getElementById('global-header').innerHTML = data;

                if (typeof initSupabase === "function") await initSupabase();
                if (typeof forceSyncHomeCart === "function") forceSyncHomeCart();

                let currentPage = window.location.pathname.split("/").pop().toLowerCase() || "index.html";

                const menuItems = document.querySelectorAll(".hm-head-moto-nav-list li");
                menuItems.forEach(li => {
                    li.classList.remove("active-li");
                    const link = li.querySelector("a");
                    if (!link) return;
                    const fileName = link.getAttribute("href").split("/").pop().toLowerCase();
                    if (fileName === currentPage) li.classList.add("active-li");
                });
            } catch (err) {
                console.error("Header Load Error:", err);
                document.getElementById('global-header').innerHTML =
                    '<p style="padding:20px;color:red;">Header load fail: ' + err.message + '</p>';
            }
        }
        loadHeader();
    </script>



</body>

</html>
